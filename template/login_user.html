{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Login – Online Banking System</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/dash.css' %}" rel="stylesheet">
</head>
<body>
<div class="obs-auth-page">
  <div class="obs-auth-card">

    <div class="auth-logo">
      <div class="logo-icon"><i class="fa-solid fa-building-columns"></i></div>
      <div class="logo-text">
        Customer Portal
        <span>Online Banking System</span>
      </div>
    </div>

    <h1 class="auth-heading">Customer Login</h1>
    <p class="auth-sub">Enter your email and password to access your account</p>

    {% if error %}
    <div class="auth-error">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="auth-input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" name="email" value="{{ email }}" class="auth-input" placeholder="Email address" autocomplete="email" required>
      </div>
      <div class="auth-input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" class="auth-input" placeholder="Password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-btn">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Login
      </button>
    </form>

    <div class="auth-switch mt-3">
      Are you an admin? <a href="{% url 'login' %}">Admin Login</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
