<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login – Online Banking System</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/dash.css' %}" rel="stylesheet">
</head>
<body>
<div class="obs-auth-page">
  <div class="obs-auth-card">

    <div class="auth-logo">
      <div class="logo-icon"><i class="fa-solid fa-building-columns"></i></div>
      <div class="logo-text">
        OBS Admin
        <span>Online Banking System</span>
      </div>
    </div>

    <h1 class="auth-heading">Welcome back</h1>
    <p class="auth-sub">Sign in to your administrator account</p>

    <div id="error-msg" class="auth-error d-none">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="error-text">Invalid username or password.</span>
    </div>

    <form id="adminLoginForm" onsubmit="return handleLogin(event)">
      <div class="auth-input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="u" class="auth-input" placeholder="Username" autocomplete="username" required>
      </div>
      <div class="auth-input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="p" class="auth-input" placeholder="Password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-btn">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-switch mt-3">
      Are you a customer? <a href="{% url 'login_user' %}">Customer Login</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'javascript/login.js' %}"></script>
</body>
</html>
